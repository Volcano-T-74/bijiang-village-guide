databases:
  - name: bijiang-village-guide-db
    plan: free
    databaseName: bijiang_village_guide
    user: bijiang_village_guide

services:
  - type: web
    name: bijiang-village-guide
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: bash start.sh
    healthCheckPath: /api/v1/bootstrap/
    domains:
      - bijiangcun.cloud
      - www.bijiangcun.cloud
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bijiang-village-guide-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: bijiangcun.cloud,www.bijiangcun.cloud,bijiang-village-guide.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://bijiangcun.cloud,https://www.bijiangcun.cloud,https://bijiang-village-guide.onrender.com
      - key: SECURE_HSTS_SECONDS
        value: "3600"
      - key: DJANGO_SUPERUSER_USERNAME
        value: bijiangcun
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: DeepSeek-V4-Pro
      - key: DEEPSEEK_BASE_URL
        value: https://api.ldwnb666.xyz/v1
      - key: DEEPSEEK_TIMEOUT_SECONDS
        value: "60"
